<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometry Dash Clone</title>
    <style>
        /* Incorporate your existing styles here */
        body { margin: 0; overflow: hidden; background: #222; font-family: sans-serif; }
        canvas { display: block; background: #0072ff; border-bottom: 5px solid #fff; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; font-size: 24px; }
    </style>
</head>
<body>
    <div id="ui">Score: <span id="score">0</span></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');

        // Game Configuration
        canvas.width = window.innerWidth;
        canvas.height = 400;

        let gravity = 0.6;
        let score = 0;
        let gameActive = true;

        // Player Object
        const player = {
            x: 100,
            y: 300,
            size: 40,
            dy: 0,
            jumpForce: -12,
            grounded: false,
            color: '#00ff00'
        };

        // Obstacles
        const obstacles = [];
        const obstacleWidth = 40;
        const obstacleHeight = 40;
        let frameCount = 0;

        function spawnObstacle() {
            obstacles.push({
                x: canvas.width,
                y: canvas.height - obstacleHeight,
                width: obstacleWidth,
                height: obstacleHeight
            });
        }

        // Input Handling
        window.addEventListener('keydown', (e) => {
            if ((e.code === 'Space' || e.code === 'ArrowUp') && player.grounded) {
                player.dy = player.jumpForce;
                player.grounded = false;
            }
        });

        // Main Game Loop
        function update() {
            if (!gameActive) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Player Physics
            player.dy += gravity;
            player.y += player.dy;

            // Ground Collision
            if (player.y + player.size > canvas.height) {
                player.y = canvas.height - player.size;
                player.dy = 0;
                player.grounded = true;
            }

            // Draw Player
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.size, player.size);
            ctx.strokeStyle = '#fff';
            ctx.strokeRect(player.x, player.y, player.size, player.size);

            // Obstacle Logic
            if (frameCount % 100 === 0) spawnObstacle();
            
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].x -= 6; // Move speed

                // Draw Obstacle (Triangle)
                ctx.fillStyle = '#ff4b2b';
                ctx.beginPath();
                ctx.moveTo(obstacles[i].x, obstacles[i].y + obstacles[i].height);
                ctx.lineTo(obstacles[i].x + obstacles[i].width / 2, obstacles[i].y);
                ctx.lineTo(obstacles[i].x + obstacles[i].width, obstacles[i].y + obstacles[i].height);
                ctx.fill();

                // Collision Detection
                if (
                    player.x < obstacles[i].x + obstacles[i].width &&
                    player.x + player.size > obstacles[i].x &&
                    player.y < obstacles[i].y + obstacles[i].height &&
                    player.y + player.size > obstacles[i].y
                ) {
                    gameOver();
                }

                // Remove off-screen obstacles
                if (obstacles[i].x + obstacles[i].width < 0) {
                    obstacles.splice(i, 1);
                    score++;
                    scoreElement.innerText = score;
                }
            }

            frameCount++;
            requestAnimationFrame(update);
        }

        function gameOver() {
            gameActive = false;
            alert(`Game Over! Score: ${score}`);
            location.reload(); 
        }

        update();
    </script>
</body>
</html>
