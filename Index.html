<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometry Dash Clone</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; background: #0072ff; }
        
        /* UI Overlay */
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: rgba(0,0,0,0.4);
            color: white;
        }

        .btn-play {
            width: 150px; height: 150px;
            background: #4CAF50;
            border: 8px solid white;
            border-radius: 20%;
            cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            font-size: 80px; transition: transform 0.2s;
        }

        .btn-play:hover { transform: scale(1.1); }
        
        .hidden { display: none !important; }
        
        #score-board {
            position: absolute; top: 20px; width: 100%;
            text-align: center; font-size: 30px; font-weight: bold;
            text-shadow: 2px 2px #000; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h1 style="font-size: 60px; margin-bottom: 40px;">GEOMETRY DASH</h1>
        <div class="btn-play" onclick="startGame()">▶</div>
        <p>Click or Space to Jump</p>
    </div>

    <div id="score-board" class="hidden">0%</div>
    <canvas id="gameCanvas"></canvas>

    <audio id="bgm" src="stereo-madness.mp3" loop></audio>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const ui = document.getElementById('ui-layer');
        const scoreBoard = document.getElementById('score-board');
        const bgm = document.getElementById('bgm');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Game Constants
        const GRAVITY = 0.8;
        const JUMP_FORCE = -12;
        const GROUND_Y = canvas.height * 0.7;
        const SPEED = 6;

        let gameActive = false;
        let frame = 0;
        let score = 0;

        const player = {
            x: 150,
            y: GROUND_Y - 50,
            w: 50,
            h: 50,
            dy: 0,
            rotation: 0,
            grounded: false
        };

        const obstacles = [];

        function spawnObstacle() {
            if (frame % 100 === 0) {
                obstacles.push({
                    x: canvas.width,
                    y: GROUND_Y - 50,
                    w: 50,
                    h: 50,
                    type: 'spike'
                });
            }
        }

        function startGame() {
            ui.classList.add('hidden');
            scoreBoard.classList.remove('hidden');
            gameActive = true;
            bgm.play().catch(() => console.log("Audio requires interaction"));
            animate();
        }

        function resetGame() {
            gameActive = false;
            obstacles.length = 0;
            player.y = GROUND_Y - 50;
            player.dy = 0;
            player.rotation = 0;
            frame = 0;
            bgm.pause();
            bgm.currentTime = 0;
            ui.classList.remove('hidden');
            scoreBoard.classList.add('hidden');
        }

        function handleJump() {
            if (player.grounded && gameActive) {
                player.dy = JUMP_FORCE;
                player.grounded = false;
            }
        }

        window.addEventListener('keydown', (e) => { if(e.code === 'Space') handleJump(); });
        window.addEventListener('mousedown', handleJump);

        function update() {
            // Physics
            player.dy += GRAVITY;
            player.y += player.dy;

            if (player.y + player.h > GROUND_Y) {
                player.y = GROUND_Y - player.h;
                player.dy = 0;
                player.grounded = true;
                // Snap rotation to nearest 90deg on land
                player.rotation = Math.round(player.rotation / 90) * 90;
            } else {
                player.rotation += 5; // Spin while in air
            }

            // Obstacles
            spawnObstacle();
            obstacles.forEach((obs, index) => {
                obs.x -= SPEED;

                // Collision detection
                if (
                    player.x < obs.x + obs.w - 10 &&
                    player.x + player.w - 10 > obs.x &&
                    player.y < obs.y + obs.h - 10 &&
                    player.y + player.h - 10 > obs.y
                ) {
                    resetGame();
                }

                if (obs.x + obs.w < 0) obstacles.splice(index, 1);
            });

            frame++;
            score = Math.floor(frame / 10);
            scoreBoard.innerText = score + "%";
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Ground
            ctx.fillStyle = '#0055cc';
            ctx.fillRect(0, GROUND_Y, canvas.width, canvas.height - GROUND_Y);
            ctx.strokeStyle = 'white';
            ctx.strokeRect(0, GROUND_Y, canvas.width, 2);

            // Draw Player
            ctx.save();
            ctx.translate(player.x + player.w/2, player.y + player.h/2);
            ctx.rotate(player.rotation * Math.PI / 180);
            ctx.fillStyle = '#00ff00';
            ctx.fillRect(-player.w/2, -player.h/2, player.w, player.h);
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 3;
            ctx.strokeRect(-player.w/2, -player.h/2, player.w, player.h);
            ctx.restore();

            // Draw Obstacles (Spikes)
            ctx.fillStyle = '#ff3333';
            obstacles.forEach(obs => {
                ctx.beginPath();
                ctx.moveTo(obs.x, obs.y + obs.h);
                ctx.lineTo(obs.x + obs.w / 2, obs.y);
                ctx.lineTo(obs.x + obs.w, obs.y + obs.h);
                ctx.fill();
            });
        }

        function animate() {
            if (!gameActive) return;
            update();
            draw();
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
